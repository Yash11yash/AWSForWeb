<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product Showcase</title>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --neon-accent: #00ffcc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            text-align: center;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        header h1 {
            margin-top: 30px;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* 🔥 Mobile screens ke liye zaroori */
            gap: 30px;
            margin-top: 50px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            width: 260px;
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease; /* Smooth transition */
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05); /* Subtle border */
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Image aspect ratio maintain karne ke liye */
            border-radius: 12px;
        }

        /* 🔥 Refined Hover animation */
        .card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 10px 25px rgba(0, 255, 204, 0.2);
            border-color: rgba(0, 255, 204, 0.4);
        }

        .card h2 {
            margin-top: 20px;
            margin-bottom: 5px;
            font-size: 1.4rem;
        }

        .card p {
            font-size: 0.95rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            flex-grow: 1; /* Button ko bottom pe push karne ke liye */
        }

        /* Naya Button Style */
        .card-btn {
            background: transparent;
            color: var(--neon-accent);
            border: 1px solid var(--neon-accent);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .card-btn:hover {
            background: var(--neon-accent);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }
    </style>
</head>

<body>

    <header>
        <h1>🔥 My Product Showcase 🔥</h1>
    </header>

    <main class="container">

        <div class="card">
            <!-- Placeholders ki jagah actual image aspect ratio -->
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80" alt="Premium Headphones">
            <h2>Product 1</h2>
            <p>Best quality studio headphones with noise cancellation.</p>
            <button class="card-btn">View Details</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80" alt="Smart Watch">
            <h2>Product 2</h2>
            <p>Premium smart watch with sleek design and health tracking.</p>
            <button class="card-btn">View Details</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80" alt="Running Shoes">
            <h2>Product 3</h2>
            <p>Affordable performance running shoes for everyday use.</p>
            <button class="card-btn">View Details</button>
        </div>

    </main>

</body>
</html>
